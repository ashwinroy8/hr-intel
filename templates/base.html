<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HR Intel{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 900:'#1e3a8a' }
          }
        }
      }
    }
  </script>
  <style>
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:500; }
    .card-hover { transition: box-shadow .15s, transform .15s; }
    .card-hover:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); transform: translateY(-1px); }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 font-sans">

{% if user is defined and user %}
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">

    <!-- Logo -->
    <a href="/dashboard" class="flex items-center gap-2 font-bold text-brand-700 text-lg shrink-0">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 12h6" />
      </svg>
      HR Intel
    </a>

    <!-- Nav links -->
    <div class="flex items-center gap-0.5 text-sm">
      <a href="/dashboard"
         class="px-3 py-1.5 rounded-md font-medium transition-colors
                {% if request.url.path == '/dashboard' %}bg-brand-50 text-brand-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
        📰 Feed
      </a>
      <a href="/contacts"
         class="px-3 py-1.5 rounded-md font-medium transition-colors
                {% if request.url.path == '/contacts' %}bg-brand-50 text-brand-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
        🎯 Pipeline
      </a>
      <a href="/bookmarks"
         class="px-3 py-1.5 rounded-md font-medium transition-colors
                {% if request.url.path == '/bookmarks' %}bg-brand-50 text-brand-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
        🔖 Saved
      </a>
      <a href="/targets"
         class="px-3 py-1.5 rounded-md font-medium transition-colors
                {% if request.url.path == '/targets' %}bg-brand-50 text-brand-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
        🎯 Today's Target
      </a>
      <a href="/settings"
         class="px-3 py-1.5 rounded-md font-medium transition-colors
                {% if request.url.path == '/settings' %}bg-brand-50 text-brand-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
        ⚙️ Settings
      </a>
      <span class="text-gray-200 mx-1">|</span>
      <span class="text-gray-400 text-xs px-2 hidden sm:block">{{ user.name or user.email }}</span>
      <a href="/logout" class="px-3 py-1.5 rounded-md text-red-500 hover:bg-red-50 font-medium transition-colors">Logout</a>
    </div>

  </div>
</nav>
{% endif %}

{% block body %}{% endblock %}

<script>
function showToast(msg, type='info') {
  const colors = {info:'#2563eb', success:'#16a34a', error:'#dc2626'};
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;background:${colors[type]||colors.info};box-shadow:0 4px 12px rgba(0,0,0,.15);transition:opacity .3s`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 3000);
}

async function refreshNews() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled=true; btn.textContent='Refreshing…'; }
  try {
    const r = await fetch('/admin/refresh-news', {method:'POST'});
    const d = await r.json();
    if (d.status === 'started') showToast('News refresh started! Reload in ~30s.', 'success');
    else if (d.status === 'cooldown') showToast(`Please wait ${Math.ceil(d.retry_in_seconds/60)} min before refreshing again.`, 'info');
  } catch(e) { showToast('Refresh failed', 'error'); }
  if (btn) { btn.disabled=false; btn.textContent='Refresh News'; }
}
</script>
</body>
</html>
